<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Notes Pro V2</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h2>📚 Study Notes Pro</h2>

<input id="search" placeholder="Search notes">

<button id="newFolder">📂 Folder</button>
<button id="newPage">➕ Page</button>

<button id="renamePage">✏️</button>
<button id="deletePage">🗑</button>

<button id="backup">💾</button>
<button id="restore">📂</button>

<button id="exportPDF">📄</button>

<button id="darkToggle">🌙</button>

</header>


<div class="container">

<aside id="sidebar">

<div id="folders"></div>

</aside>


<main>

<div id="toolbar">

<button onclick="format('bold')"><b>B</b></button>
<button onclick="format('italic')"><i>I</i></button>
<button onclick="format('underline')"><u>U</u></button>
<button onclick="format('insertUnorderedList')">•</button>

<button onclick="uploadImage()">🖼</button>

</div>


<div id="editor" contenteditable="true"></div>

<div class="info">

<span id="wordCount"></span>
<span id="lastEdit"></span>

</div>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
